name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: analytics, POSTGRES_PASSWORD: analytics, POSTGRES_DB: analytics }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U analytics" --health-interval 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm test
        env:
          ANALYTICS_DATABASE_URL: postgres://analytics:analytics@localhost:5432/analytics
      - name: migrations apply cleanly
        run: node database/migrate.mjs
        env:
          ANALYTICS_DATABASE_URL: postgres://analytics:analytics@localhost:5432/analytics

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
