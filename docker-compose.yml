# Local development stack: Postgres + API + dashboard.
# `docker compose up` then open http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 5s
      retries: 10

  migrate:
    build: .
    command: ["node", "database/migrate.mjs"]
    environment:
      ANALYTICS_DATABASE_URL: postgres://analytics:analytics@db:5432/analytics
    depends_on:
      db: { condition: service_healthy }

  api:
    build: .
    ports: ["4000:4000"]
    env_file: .env
    environment:
      ANALYTICS_DATABASE_URL: postgres://analytics:analytics@db:5432/analytics
    depends_on:
      migrate: { condition: service_completed_successfully }

  dashboard:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @ai-analytics/dashboard dev --host"
    volumes: [".:/app"]
    ports: ["3000:3000"]
    environment:
      VITE_ANALYTICS_HOST: http://localhost:4000

volumes:
  pgdata:
