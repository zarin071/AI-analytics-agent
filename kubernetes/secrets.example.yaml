# Copy to secrets.yaml (git-ignored) or manage via ExternalSecrets/SealedSecrets.
apiVersion: v1
kind: Secret
metadata:
  name: analytics-secrets
type: Opaque
stringData:
  ANALYTICS_PROJECT_NAME: "My Project"
  ANALYTICS_DATABASE_URL: "postgres://analytics:CHANGE_ME@postgres:5432/analytics"
  ANALYTICS_JWT_SECRET: "CHANGE_ME"
  ANALYTICS_SECRET_KEYS: "sk_CHANGE_ME"
  ANALYTICS_PUBLIC_KEYS: "pk_CHANGE_ME"
  ANALYTICS_ALLOWED_ORIGINS: "https://app.example.com"
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"
