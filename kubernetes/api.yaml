# API deployment + service + HPA. Apply after secrets.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  labels: { app: analytics-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: analytics-api }
  template:
    metadata:
      labels: { app: analytics-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/ai-analytics-agent:latest
          ports: [{ containerPort: 4000 }]
          envFrom:
            - secretRef: { name: analytics-secrets }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            periodSeconds: 15
      initContainers:
        - name: migrate
          image: ghcr.io/YOUR_ORG/ai-analytics-agent:latest
          command: ["node", "database/migrate.mjs"]
          envFrom:
            - secretRef: { name: analytics-secrets }
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-api
spec:
  selector: { app: analytics-api }
  ports: [{ port: 80, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: analytics-api }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
